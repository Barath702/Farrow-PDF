<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RedReader - PDF Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#930007",
                        "outline": "#af8782",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "on-primary": "#690003",
                        "tertiary-container": "#0072d7",
                        "on-tertiary-fixed-variant": "#004689",
                        "on-primary-fixed": "#410001",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "surface-tint": "#ffb4aa",
                        "surface": "#131313",
                        "on-tertiary-container": "#f8f9ff",
                        "on-background": "#e5e2e1",
                        "primary-container": "#e50914",
                        "surface-container-low": "#1c1b1b",
                        "secondary": "#c8c6c5",
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-variant": "#353534",
                        "on-tertiary": "#003061",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-primary": "#c0000c",
                        "on-error": "#690005",
                        "tertiary-fixed": "#d5e3ff",
                        "secondary-container": "#474746",
                        "surface-container": "#201f1f",
                        "on-surface-variant": "#e9bcb6",
                        "primary": "#ffb4aa",
                        "outline-variant": "#5e3f3b",
                        "tertiary": "#a7c8ff",
                        "surface-bright": "#3a3939",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-fixed": "#001b3c",
                        "on-primary-container": "#fff7f6",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#ffb4aa",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary-fixed": "#ffdad5",
                        "surface-container-highest": "#353534",
                        "on-secondary": "#313030",
                        "tertiary-fixed-dim": "#a7c8ff",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-secondary-container": "#b7b5b4",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body overflow-hidden h-screen w-screen relative">
<!-- Top Navigation Area -->
<header class="fixed top-0 w-full z-40 bg-surface/80 backdrop-blur-xl flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg text-on-surface truncate max-w-[200px] md:max-w-md">Neuro-Linguistic Pro...</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="search">search</span>
</button>
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="bookmark">bookmark</span>
</button>
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Main Canvas Content -->
<main class="w-full h-full pt-20 pb-32 px-4 md:px-16 overflow-y-auto custom-scrollbar flex flex-col items-center">
<!-- PDF Document Placeholder -->
<div class="bg-surface-container shadow-[0_0_64px_rgba(229,226,225,0.04)] w-full max-w-4xl aspect-[1/1.414] mb-16 relative overflow-hidden flex flex-col">
<!-- Document Content Simulation -->
<div class="p-8 md:p-16 flex-grow relative z-10 flex flex-col gap-6 opacity-80">
<div class="h-8 bg-surface-container-highest w-3/4 rounded-sm"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm mt-4"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm"></div>
<div class="h-4 bg-surface-container-highest w-5/6 rounded-sm"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm mt-8"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm"></div>
<div class="h-4 bg-surface-container-highest w-4/6 rounded-sm"></div>
<div class="w-full h-64 bg-surface-container-high mt-8 rounded-sm"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm mt-8"></div>
<div class="h-4 bg-surface-container-highest w-full rounded-sm"></div>
</div>
</div>
</main>
<!-- Floating Navigation Toolbar -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 z-40">
<div class="bg-surface-container-high/90 backdrop-blur-md rounded-full flex items-center shadow-[0_32px_64px_rgba(229,226,225,0.08)] px-4 py-2 gap-4">
<div class="flex items-center gap-1 border-r border-outline-variant/15 pr-4">
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="chevron_left">chevron_left</span>
</button>
<span class="font-headline text-sm font-medium text-on-surface min-w-[60px] text-center">12 / 45</span>
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<div class="flex items-center gap-2 pl-2">
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="zoom_out">zoom_out</span>
</button>
<button class="p-2 hover:bg-surface-bright rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="zoom_in">zoom_in</span>
</button>
</div>
</div>
</div>
<!-- Scrim Overlay -->
<div class="fixed inset-0 bg-black/40 z-40 backdrop-blur-sm transition-opacity"></div>
<!-- Bottom Sheet (Active Context Menu) -->
<div class="fixed bottom-0 w-full z-50 flex justify-center">
<div class="bg-surface-container-low w-full max-w-2xl rounded-t-[24px] pb-safe shadow-[0_-32px_64px_rgba(229,226,225,0.06)] flex flex-col">
<!-- Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1 bg-on-surface-variant rounded-full opacity-30"></div>
</div>
<!-- Context Actions -->
<div class="px-4 pb-8 pt-2 flex flex-col gap-2">
<!-- Action Item 1 -->
<button class="flex items-start gap-4 p-4 hover:bg-surface-container-high rounded-xl transition-colors text-left w-full group">
<div class="bg-surface-container-high group-hover:bg-surface-bright p-3 rounded-full flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-primary-container" data-icon="edit_note">edit_note</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface text-base">Add Note</span>
<span class="font-label text-sm text-on-surface-variant opacity-80 mt-1">Add note or comment to this page</span>
</div>
</button>
<!-- Action Item 2 -->
<button class="flex items-start gap-4 p-4 hover:bg-surface-container-high rounded-xl transition-colors text-left w-full group">
<div class="bg-surface-container-high group-hover:bg-surface-bright p-3 rounded-full flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="bookmark">bookmark</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface text-base">Bookmark Page</span>
<span class="font-label text-sm text-on-surface-variant opacity-80 mt-1">Save this page for quick access</span>
</div>
</button>
<!-- Action Item 3 -->
<button class="flex items-start gap-4 p-4 hover:bg-surface-container-high rounded-xl transition-colors text-left w-full group">
<div class="bg-surface-container-high group-hover:bg-surface-bright p-3 rounded-full flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="format_ink_highlighter">format_ink_highlighter</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface text-base">Highlight Text</span>
<span class="font-label text-sm text-on-surface-variant opacity-80 mt-1">Select and highlight important text</span>
</div>
</button>
<!-- Action Item 4 -->
<button class="flex items-start gap-4 p-4 hover:bg-surface-container-high rounded-xl transition-colors text-left w-full group">
<div class="bg-surface-container-high group-hover:bg-surface-bright p-3 rounded-full flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="photo_camera">photo_camera</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface text-base">Capture Page</span>
<span class="font-label text-sm text-on-surface-variant opacity-80 mt-1">Save or share this page</span>
</div>
</button>
</div>
</div>
</div>
</body></html>
