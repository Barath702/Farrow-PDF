<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RedReader - PDF Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#003061",
                        "inverse-primary": "#c0000c",
                        "tertiary-fixed-dim": "#a7c8ff",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#ffdad5",
                        "on-secondary": "#313030",
                        "primary-fixed-dim": "#ffb4aa",
                        "inverse-on-surface": "#313030",
                        "surface-container": "#201f1f",
                        "on-tertiary-fixed-variant": "#004689",
                        "secondary-fixed": "#e5e2e1",
                        "tertiary-container": "#0072d7",
                        "secondary-container": "#474746",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-fixed": "#001b3c",
                        "inverse-surface": "#e5e2e1",
                        "secondary": "#c8c6c5",
                        "outline": "#af8782",
                        "surface-tint": "#ffb4aa",
                        "on-secondary-container": "#b7b5b4",
                        "background": "#131313",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#a7c8ff",
                        "on-tertiary-container": "#f8f9ff",
                        "on-surface-variant": "#e9bcb6",
                        "on-primary-container": "#fff7f6",
                        "surface-dim": "#131313",
                        "surface-variant": "#353534",
                        "on-secondary-fixed": "#1c1b1b",
                        "tertiary-fixed": "#d5e3ff",
                        "outline-variant": "#5e3f3b",
                        "on-surface": "#e5e2e1",
                        "on-background": "#e5e2e1",
                        "on-primary-fixed": "#410001",
                        "on-error": "#690005",
                        "surface-container-highest": "#353534",
                        "surface-bright": "#3a3939",
                        "on-primary-fixed-variant": "#930007",
                        "on-secondary-fixed-variant": "#474746",
                        "surface": "#131313",
                        "primary-container": "#e50914",
                        "primary": "#ffb4aa",
                        "surface-container-lowest": "#0e0e0e",
                        "error-container": "#93000a",
                        "on-primary": "#690003",
                        "surface-container-high": "#2a2a2a",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles to hide scrollbars for cleaner cinematic look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body h-screen w-screen overflow-hidden flex flex-col antialiased">
<!-- Top App Bar (Modified for Document View - Hide standard nav, use specific doc tools) -->
<header class="bg-[#131313]/90 backdrop-blur-xl rounded-full mt-4 mx-4 md:mx-auto max-w-5xl shadow-[0_8px_32px_rgba(0,0,0,0.4)] flex justify-between items-center px-4 py-2 z-40 fixed top-0 left-0 right-0 transition-all ring-1 ring-white/10">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-[#E5E2E1] hover:bg-[#3A3939] transition-colors p-2 rounded-full Active: scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex">
<h1 class="font-headline font-medium tracking-tight text-sm text-on-surface max-w-[150px] md:max-w-[350px] truncate">
                    Neuro-Linguistic Programming Architecture in Modern LLMs.pdf
                </h1>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-[#E5E2E1] hover:bg-[#3A3939] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
<button class="text-[#E5E2E1] hover:bg-[#3A3939] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">bookmark</span>
</button>
<button class="text-[#E5E2E1] hover:bg-[#3A3939] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</div>
</header>
<!-- Main Canvas (The "Exhibit") -->
<main class="flex-1 w-full h-full pt-[72px] pb-[100px] overflow-y-auto flex justify-center items-start bg-surface-container-lowest px-4 md:px-12 relative z-0">
<!-- Document Container with Ambient Shadow -->
<div class="w-full max-w-4xl bg-surface-container-low min-h-[1200px] my-8 rounded-sm relative shadow-[0_32px_64px_rgba(229,226,225,0.04)] ring-1 ring-outline-variant/15 flex flex-col items-center justify-center overflow-hidden">
<!-- Placeholder for PDF Content Image -->
<img alt="Abstract rendering of dense academic text and diagrams on a slightly textured matte paper surface, cinematic soft lighting from top left" class="w-full h-auto object-cover opacity-80 mix-blend-luminosity grayscale contrast-125 pointer-events-none" data-alt="Abstract rendering of dense academic text and diagrams on a slightly textured matte paper surface, cinematic soft lighting from top left" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQQx7PpLOdypz6IZIrCypx6bw1UOzGpPEwukpAe_KCZyOeTMZn9_aFNybSHV3qBkg0MVsAAtiwNwzeJJfh_FKfJCRIotu5hG0Co2LLkgA_pc3ZheZvRUNdcuvOrDmZxigeF3do06O1twmGh6jkG5ovaIdBifR12wlOa9o7VZgHepgs_HEYwI8tyfkZNY3xIYuy4Sb1iVxLYTj3LwMECKH9Zchqsudnj-K622dBWbBd3dJo5Wx3h6XlGvtZJb0r7zDOdRd0NC4QP7M"/>
<!-- Overlay to darken the placeholder slightly to fit the nocturnal theme -->
<div class="absolute inset-0 bg-surface-container-low/40 pointer-events-none"></div>
<!-- Mock Text Selection Highlight (Optional, for flavor) -->
<div class="absolute top-[35%] left-[20%] w-[40%] h-[2%] bg-primary-container/20 rounded-sm pointer-events-none mix-blend-screen"></div>
</div>
</main>
<!-- Bottom Toolbar (Pill Shape) -->
<nav class="bg-zinc-900/90 backdrop-blur-xl rounded-full mb-6 mx-auto w-fit px-6 shadow-[0_8px_32px_rgba(0,0,0,0.4)] fixed bottom-0 left-1/2 -translate-x-1/2 z-50 flex items-center justify-center gap-4 py-3 ring-1 ring-white/10">
<!-- Page Navigation Left -->
<button class="text-[#E5E2E1]/60 hover:text-[#E50914] transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">chevron_left</span>
</button>
<!-- Page Indicator -->
<div class="font-headline text-[12px] font-medium tracking-widest text-[#E5E2E1] flex flex-col items-center justify-center min-w-[60px]">
<span>12 / 45</span>
</div>
<!-- Page Navigation Right -->
<button class="text-[#E5E2E1]/60 hover:text-[#E50914] transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<!-- Divider -->
<div class="w-px h-6 bg-[#E5E2E1]/20 mx-2"></div>
<!-- Zoom Controls -->
<div class="flex items-center gap-2">
<button class="text-[#E5E2E1]/60 hover:text-[#E50914] transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">zoom_out</span>
</button>
<button class="text-[#E5E2E1]/60 hover:text-[#E50914] transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">zoom_in</span>
</button>
</div>
</nav>
<!-- Floating Action Button (Active Reading Mode Toggle - Asymmetric placement) -->
<button class="fixed bottom-24 right-8 w-14 h-14 bg-primary-container rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(229,9,20,0.2)] hover:shadow-[0_8px_32px_rgba(229,9,20,0.4)] transition-all z-40 group">
<span class="material-symbols-outlined text-on-primary-container group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">edit_note</span>
</button>
</body></html>
